<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ዳሎቻ ወረዳ | Dalocha woreda</title>
    <link rel="stylesheet" href="style.css">
</head>
<body
 <header class="navbar">
        <div class="nav-container">
            <h1 class="logo">ዳሎቻ ወረዳ</h1>
            <div class="nav-controls">
                <div class="lang-selector">
                    <select>
                        <option value="am">አማርኛ</option>
                        <option value="en">English</option>
                    </select>
                </div>
                <button class="menu-toggle">☰</button>
            </div>
        </div>
    </header>

    <main class="content-wrapper">
        <section class="slider-section">
            <div class="slider-container">
                
                <div class="slide active">
                    <img src="3C0A6549.JPG" alt="Dalocha City Night View 1">
                    <div class="slider-caption">
                        <p>የዳሎቻ ከተማ የምሽት ውበት። | The beautiful night view of Dalocha City.</p>
                    </div>
                </div>

                <div class="slide">
                    <img src="3C0A6548.JPG" alt="Dalocha City Night View 2">
                    <div class="slider-caption">
                        <p>ደማቅ እና ማራኪ ድባብ። | Vibrant and attractive atmosphere.</p>
                    </div>
                </div>

                <div class="slide">
                    <img src="3C0A6578.JPG" alt="Dalocha City Night View 3">
                    <div class="slider-caption">
                        <p>እንኳን ወደ ውቧ ከተማችን በደህና መጡ! | Welcome to our beautiful city!</p>
                    </div>
                </div>

                <button class="slider-btn prev-btn" onclick="changeSlide(-1)">&#10094;</button>
                <button class="slider-btn next-btn" onclick="changeSlide(1)">&#10095;</button>
            </div>
        </section>
    </main>

    <script>
        // Simple JavaScript to make the slider buttons work
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');

        function showSlide(index) {
            slides[currentSlide].classList.remove('active');
            currentSlide = (index + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        function changeSlide(direction) {
            showSlide(currentSlide + direction);
        }
    </script>
</body>
                        </html>            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" placeholder="ፈልግ... Search...">
            </div>
            <div class="filter-box"><span>ሁሉም ክፍሎች</span><i class="fa-solid fa-chevron-down"></i></div>
        </section>
    </main>
    <div class="fab-btn"><i class="fa-regular fa-envelope"></i></div>
</body>
      </html>
