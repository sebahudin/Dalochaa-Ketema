<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ዳሎቻ ከተማ | Dalocha City</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="navbar">
        <div class="nav-container">
            <h1 class="logo">ዳሎቻ ከተማ</h1>
            <div class="nav-controls">
                <div class="lang-selector">
                    <select><option>አማርኛ</option><option>English</option></select>
                </div>
                <button class="menu-toggle"><i class="fa-solid fa-bars"></i></button>
            </div>
        </div>
    </header>
    <main class="content-wrapper">
        <section class="slider-section">
            <div class="slider-container">
                <img src="https://images.unsplash.com/photo-1542362567-b07eac79094d?auto=format&fit=crop&w=1200&q=80" alt="Dalocha" class="slider-image">
                <button class="slider-btn prev-btn"><i class="fa-solid fa-chevron-left"></i></button>
                <button class="slider-btn next-btn"><i class="fa-solid fa-chevron-right"></i></button>
                <div class="slider-caption"><p>የዳሎቻ ከተማ ምስል - ገፅ</p></div>
                <div class="slider-dots"><span class="dot active"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
            </div>
        </section>
        <section class="info-card">
            <h2>Socio-Economic and Geo-spatial Data</h2>
            <h3>ማህበራዊ-ኢኮኖሚያዊ መረጃ</h3>
        </section>
        <section class="search-section">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" placeholder="ፈልግ... Search...">
            </div>
            <div class="filter-box"><span>ሁሉም ክፍሎች</span><i class="fa-solid fa-chevron-down"></i></div>
        </section>
    </main>
    <div class="fab-btn"><i class="fa-regular fa-envelope"></i></div>
</body>
      </html>
